<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ recap['pet_name'] }}'s Visit | Pookie's Pet Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --g-dark:   #192f19;
      --g-mid:    #2b5220;
      --g-light:  #4a7c3f;
      --cream:    #f6f1e6;
      --cream-dk: #ede7d7;
      --amber:    #c47a2a;
      --amber-lt: #e8963a;
      --text:     #121f12;
      --text-mid: #495949;
      --text-lt:  #7a8c7a;
      --white:    #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--cream-dk);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 390px;
      background: var(--white);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 4px 6px rgba(25, 47, 25, .06),
        0 20px 48px rgba(25, 47, 25, .12);
    }
    .card-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--g-mid);
    }
    .card-header {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, var(--g-dark) 0%, var(--g-mid) 55%, var(--g-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 30%, rgba(232, 150, 58, .18) 0%, transparent 60%);
      pointer-events: none;
    }
    .card-header svg {
      position: relative;
      z-index: 1;
      width: 64px;
      height: 64px;
      opacity: .35;
    }
    .card-body {
      padding: 28px 24px 24px;
    }
    .pet-name {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--g-dark);
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .service {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 20px;
    }
    .recap-text {
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 24px;
    }
    .visit-date {
      font-size: .82rem;
      color: var(--text-lt);
      margin-bottom: 20px;
    }
    .footer {
      border-top: 1px solid var(--cream-dk);
      padding-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .footer-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: contain;
      background: var(--cream);
      padding: 4px;
    }
    .footer-text {
      font-family: 'Fraunces', serif;
      font-size: .92rem;
      font-weight: 600;
      color: var(--g-mid);
    }
    .footer-tag {
      font-size: .72rem;
      color: var(--text-lt);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <article class="card">
    {% if recap['image_filename'] %}
    <img
      class="card-photo"
      src="{{ url_for('static', filename='recap_images/' + recap['image_filename']) }}"
      alt="Visit photo of {{ recap['pet_name'] }}"
    />
    {% else %}
    <div class="card-header" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="18" ry="14" fill="rgba(246,241,230,0.25)"/>
        <circle cx="22" cy="22" r="7" fill="rgba(246,241,230,0.2)"/>
        <circle cx="32" cy="16" r="7" fill="rgba(246,241,230,0.2)"/>
        <circle cx="42" cy="22" r="7" fill="rgba(246,241,230,0.2)"/>
        <circle cx="18" cy="32" r="5" fill="rgba(246,241,230,0.15)"/>
        <circle cx="46" cy="32" r="5" fill="rgba(246,241,230,0.15)"/>
      </svg>
    </div>
    {% endif %}

    <div class="card-body">
      <h1 class="pet-name">{{ recap['pet_name'] }}</h1>
      {% if recap['service'] %}
      <p class="service">{{ recap['service'] }}</p>
      {% endif %}
      <p class="recap-text">{{ recap['recap_text'] }}</p>
      <p class="visit-date">{{ recap['created_at'] | format_date }}</p>
      <footer class="footer">
        <img
          class="footer-logo"
          src="{{ url_for('static', filename='pookies-logo.png') }}"
          alt=""
        />
        <div>
          <p class="footer-text">Pookie's Pet Care</p>
          <p class="footer-tag">Trusted local pet care</p>
        </div>
      </footer>
    </div>
  </article>
</body>
</html>
